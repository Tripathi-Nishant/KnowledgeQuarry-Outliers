# PPO Hyperparameters
ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01          # encourage exploration
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch:
    pi: [128, 128]
    vf: [128, 128]

# Environment Configuration
env:
  n_lanes: 3
  road_length: 1000
  bottleneck_x: 620
  merge_start: 430
  max_vehicles: 40
  max_steps: 2000
  reward_mode: "mixed"
  alpha: 0.4

# Curriculum Training Stages
curriculum:
  - name: "Easy - Low Traffic"
    aggressive_ratio: 0.1
    arrival_rate: 3.0
    timesteps: 100000
  - name: "Moderate - Mixed"
    aggressive_ratio: 0.2
    arrival_rate: 4.0
    timesteps: 150000
  - name: "Hard - Heavy Mixed"
    aggressive_ratio: 0.3
    arrival_rate: 5.0
    timesteps: 150000
  - name: "Stress - High Aggression"
    aggressive_ratio: 0.4
    arrival_rate: 6.0
    timesteps: 100000
